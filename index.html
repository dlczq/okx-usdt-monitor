<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OKX USDT Monitor</title>

<style>

body{
background:#0b1d3a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:40px;
}

table{
width:90%;
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#1f4db8;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #333;
}

</style>

</head>

<body>

<h1>OKX USDT C2C</h1>

<table>

<thead>
<tr>
<th>#</th>
<th>Price</th>
<th>Merchant</th>
<th>Limit</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

<script>

async function loadData(){

try{

let url="https://api.allorigins.win/raw?url=https://p2p.okx.com/v2/c2c/tradingOrders/books?quoteCurrency=CNY&baseCurrency=USDT&side=sell&page=1&size=10";

let res=await fetch(url);

let data=await res.json();

let list=data.data;

let html="";

for(let i=0;i<list.length;i++){

let item=list[i];

html+=`
<tr>
<td>${i+1}</td>
<td>${item.price}</td>
<td>${item.nickName}</td>
<td>${item.minAmount} - ${item.maxAmount}</td>
</tr>
`;

}

document.getElementById("list").innerHTML=html;

}catch(e){

document.getElementById("list").innerHTML="<tr><td colspan='4'>Loading failed</td></tr>";

}

}

loadData();

setInterval(loadData,10000);

</script>

</body>

</html>
