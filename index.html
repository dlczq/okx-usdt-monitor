<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OKX USDT C2C</title>

<style>
body{
background:#08142b;
color:white;
font-family:Arial;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
}

table{
background:#0e2a66;
border-radius:10px;
overflow:hidden;
border-collapse:collapse;
}

th,td{
padding:10px 15px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
background:#1840a0;
}
</style>
</head>

<body>

<h1>OKX USDT C2C</h1>

<div class="container">

<table>
<thead>
<tr>
<th>#</th>
<th>Price</th>
<th>Merchant</th>
<th>Limit</th>
</tr>
</thead>
<tbody id="buy"></tbody>
</table>

<table>
<thead>
<tr>
<th>#</th>
<th>Price</th>
<th>Merchant</th>
<th>Limit</th>
</tr>
</thead>
<tbody id="sell"></tbody>
</table>

</div>

<script>

async function loadData(){

const url="https://p2p.okx.com/v2/c2c/tradingOrders/books";

const body={
quoteCurrency:"CNY",
baseCurrency:"USDT",
side:"buy",
page:1,
rows:10
};

const res=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url),{
method:"POST",
headers:{
"content-type":"application/json"
},
body:JSON.stringify(body)
});

const data=await res.json();

const buy=document.getElementById("buy");
buy.innerHTML="";

data.data.forEach((v,i)=>{

buy.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${v.price}</td>
<td>${v.nickName}</td>
<td>${v.minTrade} - ${v.maxTrade}</td>
</tr>
`;

});

}

loadData();

setInterval(loadData,15000);

</script>

</body>
</html>
