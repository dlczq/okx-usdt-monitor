<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OKX USDT C2C</title>

<style>
body{
font-family:Arial;
background:#0b1b3a;
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
}

table{
border-collapse:collapse;
background:#0f2a66;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px 15px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
background:#123a8f;
}
</style>
</head>

<body>

<h1>OKX USDT C2C</h1>

<div class="container">

<table id="buyTable">
<thead>
<tr>
<th>#</th>
<th>Price</th>
<th>Merchant</th>
<th>Limit</th>
</tr>
</thead>
<tbody></tbody>
</table>

<table id="sellTable">
<thead>
<tr>
<th>#</th>
<th>Price</th>
<th>Merchant</th>
<th>Limit</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

async function loadBuy(){

const url="https://corsproxy.io/?https://www.okx.com/v3/c2c/tradingOrders/books";

const res=await fetch(url,{
method:"POST",
headers:{
"content-type":"application/json"
},
body:JSON.stringify({
baseCurrency:"USDT",
quoteCurrency:"CNY",
side:"buy",
page:1,
rows:10
})
})

const data=await res.json()

const tbody=document.querySelector("#buyTable tbody")
tbody.innerHTML=""

data.data.forEach((item,i)=>{

let row=`
<tr>
<td>${i+1}</td>
<td>${item.price}</td>
<td>${item.nickName}</td>
<td>${item.minTrade} - ${item.maxTrade}</td>
</tr>
`

tbody.innerHTML+=row

})

}

async function loadSell(){

const url="https://corsproxy.io/?https://www.okx.com/v3/c2c/tradingOrders/books";

const res=await fetch(url,{
method:"POST",
headers:{
"content-type":"application/json"
},
body:JSON.stringify({
baseCurrency:"USDT",
quoteCurrency:"CNY",
side:"sell",
page:1,
rows:10
})
})

const data=await res.json()

const tbody=document.querySelector("#sellTable tbody")
tbody.innerHTML=""

data.data.forEach((item,i)=>{

let row=`
<tr>
<td>${i+1}</td>
<td>${item.price}</td>
<td>${item.nickName}</td>
<td>${item.minTrade} - ${item.maxTrade}</td>
</tr>
`

tbody.innerHTML+=row

})

}

function refresh(){

loadBuy()
loadSell()

}

refresh()

setInterval(refresh,15000)

</script>

</body>
</html>
