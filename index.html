<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信聊天界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Arial", sans-serif;
            background-color: #f0f0f0;
        }

        .chat-container {
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .header {
            background-color: #07c160;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header .user {
            font-size: 18px;
        }

        .header .back {
            cursor: pointer;
        }

        .message-container {
            padding: 10px;
            max-height: 500px;
            overflow-y: auto;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            align-items: flex-end;
        }

        .message .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #ccc;
            margin-right: 10px;
        }

        .message .text {
            max-width: 250px;
            padding: 10px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 20px;
            word-wrap: break-word;
        }

        .message .text.left {
            background-color: #e0f8e0;
            color: #333;
        }

        .message .text.right {
            background-color: #87cefa;
            color: white;
            margin-left: auto;
        }

        .message .time {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .input-container {
            display: flex;
            padding: 10px;
            background-color: #f5f5f5;
        }

        .input-container input {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .input-container button {
            background-color: #07c160;
            color: white;
            border: none;
            border-radius: 50%;
            padding: 10px;
            margin-left: 10px;
            cursor: pointer;
        }

        .input-container button:disabled {
            background-color: #aaa;
        }

        .background-image {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <span class="user">张三</span>
            <span class="back" onclick="window.history.back();">返回</span>
        </div>
        <div class="message-container" id="message-container">
            <div class="message">
                <div class="avatar"></div>
                <div class="text left">你好！</div>
            </div>
            <div class="message">
                <div class="avatar"></div>
                <div class="text right">你好，今天过得怎么样？</div>
            </div>
            <div class="message">
                <div class="avatar"></div>
                <div class="text left">挺不错的，你呢？</div>
            </div>
            <div class="message">
                <div class="avatar"></div>
                <div class="text right">还行，刚吃完午饭。</div>
            </div>
            <div class="message">
                <div class="avatar"></div>
                <div class="text left">发个图片看看呗。</div>
            </div>
        </div>
        <div class="input-container">
            <input type="text" id="message-input" placeholder="输入消息...">
            <button id="send-button" onclick="sendMessage()">发送</button>
        </div>
    </div>
    <div class="background-image" id="background-image"></div>

    <script>
        function sendMessage() {
            let messageInput = document.getElementById('message-input');
            let messageContainer = document.getElementById('message-container');
            let messageText = messageInput.value.trim();
            
            if (messageText) {
                let newMessage = document.createElement('div');
                newMessage.classList.add('message');
                
                newMessage.innerHTML = `
                    <div class="avatar"></div>
                    <div class="text right"></div>
                    <div class="time"></div>
                `;
                
                messageContainer.appendChild(newMessage);
                messageInput.value = '';
                messageContainer.scrollTop = messageContainer.scrollHeight;
            }
        }

        // Set background image if available
        document.getElementById('background-image').style.display = 'block';
        document.getElementById('background-image').style.backgroundImage = "url('https://example.com/background.jpg')";
    </script>
</body>
</html>
