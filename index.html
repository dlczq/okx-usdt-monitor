<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>OKX USDT Monitor</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin-top:30px;
}

h1{
font-size:34px;
margin-bottom:20px;
}

.container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

table{
border-collapse:collapse;
background:#1e293b;
width:350px;
border-radius:10px;
overflow:hidden;
}

th{
background:#020617;
padding:10px;
font-size:14px;
}

td{
padding:8px;
border-bottom:1px solid #334155;
font-size:13px;
}

.buy{
color:#22c55e;
}

.sell{
color:#ef4444;
}

.info{
margin-top:20px;
font-size:18px;
}

.time{
margin-top:10px;
color:#94a3b8;
}

</style>

</head>

<body>

<h1>OKX USDT C2C</h1>

<div class="container">

<table>
<thead>
<tr>
<th colspan="4">BUY TOP 10</th>
</tr>
<tr>
<th>#</th>
<th>Price</th>
<th>Merchant</th>
<th>Limit</th>
</tr>
</thead>
<tbody id="buyList"></tbody>
</table>

<table>
<thead>
<tr>
<th colspan="4">SELL TOP 10</th>
</tr>
<tr>
<th>#</th>
<th>Price</th>
<th>Merchant</th>
<th>Limit</th>
</tr>
</thead>
<tbody id="sellList"></tbody>
</table>

</div>

<div class="info" id="spread"></div>
<div class="time" id="time"></div>

<script>

async function loadPrice(){

try{

// BUY
let buyURL="https://api.allorigins.win/raw?url=https://www.okx.com/api/v5/p2p/public/offers?quoteCurrency=CNY&baseCurrency=USDT&side=buy&page=1&size=10";

let buyRes=await fetch(buyURL);
let buyData=await buyRes.json();

let buyHTML="";

buyData.data.slice(0,10).forEach((item,i)=>{

buyHTML+=`
<tr>
<td>${i+1}</td>
<td class="buy">${item.price}</td>
<td>${item.nickName}</td>
<td>${item.quoteMinAmountPerOrder}-${item.quoteMaxAmountPerOrder}</td>
</tr>
`;

});

document.getElementById("buyList").innerHTML=buyHTML;

let bestBuy=parseFloat(buyData.data[0].price);


// SELL
let sellURL="https://api.allorigins.win/raw?url=https://www.okx.com/api/v5/p2p/public/offers?quoteCurrency=CNY&baseCurrency=USDT&side=sell&page=1&size=10";

let sellRes=await fetch(sellURL);
let sellData=await sellRes.json();

let sellHTML="";

sellData.data.slice(0,10).forEach((item,i)=>{

sellHTML+=`
<tr>
<td>${i+1}</td>
<td class="sell">${item.price}</td>
<td>${item.nickName}</td>
<td>${item.quoteMinAmountPerOrder}-${item.quoteMaxAmountPerOrder}</td>
</tr>
`;

});

document.getElementById("sellList").innerHTML=sellHTML;

let bestSell=parseFloat(sellData.data[0].price);


// Spread
let spread=(bestSell-bestBuy).toFixed(3);

document.getElementById("spread").innerText="Spread: "+spread;


// Time
document.getElementById("time").innerText="Updated: "+new Date().toLocaleTimeString();

}catch(e){

console.log(e);

}

}

loadPrice();

setInterval(loadPrice,10000);

</script>

</body>

</html>
